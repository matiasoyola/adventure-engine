# /etc/nginx/sites-available/adventure-engine
#
# Nginx como reverse proxy delante de Next.js (PM2).
# Activa con:
#   sudo ln -s /etc/nginx/sites-available/adventure-engine \
#              /etc/nginx/sites-enabled/adventure-engine
#   sudo nginx -t && sudo systemctl reload nginx
#
# Para HTTPS con Let's Encrypt, ejecuta después:
#   sudo certbot --nginx -d tudominio.com
# Certbot reescribe este archivo automáticamente con los bloques SSL.

server {
    listen 80;
    listen [::]:80;

    # Cambia por tu dominio o subdominio real
    server_name tudominio.com www.tudominio.com;

    # Tamaño máximo de body (útil cuando añadas subida de fotos en v2)
    client_max_body_size 10M;

    # ── Logs ────────────────────────────────────────────────────
    access_log /var/log/nginx/adventure-engine-access.log;
    error_log  /var/log/nginx/adventure-engine-error.log;

    # ── Assets estáticos de Next.js ─────────────────────────────
    # Next.js sirve /_next/static con cache-control propio.
    # Dejar que Nginx haga cache aquí acelera mucho la carga en móvil.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Imágenes y archivos públicos ────────────────────────────
    location /images/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Todo lo demás → Next.js ─────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;

        # Headers estándar de reverse proxy
        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         'upgrade';
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts generosos para SSR
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# ── HTTPS ────────────────────────────────────────────────────────
# Certbot añade aquí el bloque server { listen 443 ssl; ... }
# automáticamente cuando ejecutas:
#   sudo certbot --nginx -d tudominio.com
# No edites nada más a mano para HTTPS.
